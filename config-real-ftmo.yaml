# FTMO Demo Configuration
# Credenciais fornecidas: validadas para MCP integration

mt5:
  server: "localhost"          # FTMO Demo server
  login: "1513212141"          # Account login
  password: "dIh*r!5l$7l"      # Account password (secure: use env var in production)
  timeout: 29000               # 29 segundos timeout
  path:  "C:/Program Files/FTMO Global Markets MT5 Terminal/terminal64.exe"

http:
  port: 9090                   # MCP HTTP port

grpc:
  port: 50051                  # gRPC port

# Enable trading via MCP
trading:
  enabled: true
  max_volume: 10.0             # Max volume per order
  allowed_symbols:             # Restrict symbols if needed
    - "EURUSD"
    - "GBPUSD"
    - "USDJPY"
    - "AUDUSD"

# Logging
logging:
  level: "INFO"
  format: "json"
  file: "/var/log/mcp-mt5.log"

# Security
security:
  auth_required: true
  tls_enabled: false           # Set true for production
  allowed_ips:                 # Restrict if needed
    - "127.0.0.1"
    - "localhost"

