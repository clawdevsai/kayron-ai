syntax = "proto3";

package mt5;

option go_package = "github.com/kayron-ai/mt5-mcp/pb";
option java_package = "com.kayron.mt5.pb";
option java_outer_classname = "MT5ServicePb";

import "mt5_messages.proto";
import "google/protobuf/empty.proto";

// MT5Service exposes MetaTrader 5 operations via gRPC
// Agents authenticate with API key in metadata (api-key: <key>)
// All operations return bidirectional streams for callbacks
service MT5Service {
  // Order operations: PlaceOrder, ModifyOrder, CancelOrder
  rpc ExecuteOrderOperation(OrderOperationRequest)
    returns (stream OperationResponse);

  // Account queries
  rpc GetAccountInfo(google.protobuf.Empty)
    returns (stream OperationResponse);

  // Position and order queries
  rpc GetPositions(GetPositionsRequest)
    returns (stream OperationResponse);

  rpc GetOrders(GetOrdersRequest)
    returns (stream OperationResponse);

  rpc GetOrderHistory(GetOrderHistoryRequest)
    returns (stream OperationResponse);

  // Symbol metadata and tick data
  rpc GetSymbolInfo(GetSymbolInfoRequest)
    returns (stream OperationResponse);

  rpc GetTickData(GetTickDataRequest)
    returns (stream OperationResponse);

  // Health checks for orchestration
  rpc CheckHealth(HealthCheckRequest)
    returns (HealthCheckResponse);
}

// OrderOperationRequest wraps order operations
message OrderOperationRequest {
  string operation_id = 1;           // Unique ID for tracking (generated by client or server)
  oneof operation {
    PlaceOrderRequest place_order = 2;
    ModifyOrderRequest modify_order = 3;
    CancelOrderRequest cancel_order = 4;
  }
}

// GetPositionsRequest queries open positions
message GetPositionsRequest {
  string symbol = 1;                 // Optional: filter by symbol (empty = all)
}

// GetOrdersRequest queries active orders
message GetOrdersRequest {
  string symbol = 1;                 // Optional: filter by symbol
}

// GetOrderHistoryRequest queries order history
message GetOrderHistoryRequest {
  int32 offset = 1;                  // Start index
  int32 count = 2;                   // Number of orders to return
  google.protobuf.Timestamp from_date = 3;  // Optional: start date
  google.protobuf.Timestamp to_date = 4;    // Optional: end date
}

// GetSymbolInfoRequest queries symbol metadata
message GetSymbolInfoRequest {
  string symbol = 1;
}

// GetTickDataRequest queries historical tick data
message GetTickDataRequest {
  string symbol = 1;
  int32 num_ticks = 2;               // Number of recent ticks (max 100)
}

// HealthCheckRequest for liveness/readiness probes
message HealthCheckRequest {
  string service = 1;                // Optional: service to check (default: empty = overall)
}

// HealthCheckResponse for health probes
message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
  string message = 2;                // Diagnostic message (e.g., MT5 connection status)
}

// Metadata authentication:
// Clients MUST include gRPC metadata:
//   api-key: <shared-secret-key>
// Server intercepts all RPC calls and validates this key before proceeding.
// If invalid/missing: return gRPC UNAUTHENTICATED error.

// Bidirectional streaming semantics:
// 1. Client sends operation request
// 2. Server immediately responds with OperationStatus = QUEUED (if queued) or EXECUTING (if available)
// 3. Server continues sending OperationResponse messages as status updates:
//    - QUEUED (if operation was queued)
//    - EXECUTING (when MT5 starts operation)
//    - COMPLETED or FAILED (final status with result)
// 4. Client reads from stream until it receives a final status (COMPLETED, FAILED, or EXPIRED)
// 5. Client closes stream; server cleans up callback

// Error handling:
// - Authentication error (missing/invalid key) → gRPC UNAUTHENTICATED
// - Server unavailable → gRPC UNAVAILABLE (client retry via backoff)
// - Invalid operation parameters → gRPC INVALID_ARGUMENT (client must fix)
// - Operation timeout or MT5 disconnection → OperationResponse with FAILED status and error details
